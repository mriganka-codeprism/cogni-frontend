# Project identification
sonar.projectKey=ai-interview-app
sonar.projectName=AI Interview App
sonar.projectVersion=1.0

# Source code location
sonar.sources=src
sonar.tests=src

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# TypeScript specific settings
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude node_modules and other unnecessary files
sonar.exclusions=node_modules/**,**/*.spec.ts,**/*.test.ts
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts

# Coverage settings
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts

# Additional settings
sonar.host.url=http://135.235.176.111:9000/sonarqube
